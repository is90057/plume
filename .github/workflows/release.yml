# 打 tag（v*）觸發三平台打包，產物上傳到 GitHub Release（draft，手動發布）。
# 簽章現況：macOS ad-hoc / Windows 未簽——自用與小範圍分發 OK，
# 安裝時 macOS 需右鍵開啟（或 xattr -dc）、Windows 會見 SmartScreen 提示。
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest # Intel（cross-compile）
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest # Windows x64（NSIS）
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Plume ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
